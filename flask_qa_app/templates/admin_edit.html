<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Düzenle</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-theme">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title text-center mb-4">
                            <i class="fa-solid fa-pen-to-square"></i> Kayıt Düzenle
                        </h4>
                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label">Başlık</label>
                                <input type="text" name="title" class="form-control" value="{{ record.get('title', '') }}" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Tanım</label>
                                <textarea name="definition" class="form-control">{{ record.get('content', {}).get('definition', '') }}</textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Kategori</label>
                                <input type="text" name="category" class="form-control" value="{{ record.get('category', '') }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Dil</label>
                                <input type="text" name="language" class="form-control" value="{{ record.get('language', '') }}">
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-check"></i> Güncelle
                                </button>
                                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-light">
                                    <i class="fa-solid fa-arrow-left"></i> Admin Paneline Dön
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
