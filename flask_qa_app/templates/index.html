<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Türk Dilleri Soru-Cevap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="navbar-brand">
                <i class="fa-solid fa-globe"></i> Türk Dilleri Veri Sistemi
            </a>
            <div class="navbar-actions">
                <a href="{{ url_for('admin_login') }}" class="btn btn-outline-light btn-sm">
                    <i class="fa-solid fa-lock"></i> Admin
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">
                            <i class="fa-solid fa-question-circle"></i> Dil Bilgisine Dair Sorunuzu Yazın
                        </h3>
                        <form method="POST">
                            <div class="mb-3">
                                <label for="question" class="form-label">Sorunuz:</label>
                                <input type="text" name="question" id="question" class="form-control form-control-lg" 
                                       placeholder="Örn: Ünlü düşmesi kuralı nedir?" 
                                       value="{{ question }}" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fa-solid fa-rocket"></i> Cevapla
                                </button>
                            </div>
                        </form>
                        {% if answer %}
                        <hr>
                        <div class="mt-4">
                            <h4 class="text-success"><i class="fa-solid fa-book-open"></i> Cevap</h4>
                            <div class="alert alert-success mt-2">
                                <strong>{{ answer.title }}</strong>
                                <p class="mt-2">{{ answer.definition }}</p>
                                {% if answer.category %}
                                <small class="text-muted">
                                    <i class="fa-solid fa-layer-group"></i> {{ answer.category }} | 
                                    <i class="fa-solid fa-language"></i> {{ answer.language }}
                                </small>
                                {% endif %}
                            </div>
                        </div>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
